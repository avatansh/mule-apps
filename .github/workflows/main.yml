- name: Create Maven settings.xml
        run: |
          python3 - << 'PYEOF'
          import os, pathlib
          cid = os.environ['ANYPOINT_CLIENT_ID']
          csec = os.environ['ANYPOINT_CLIENT_SECRET']
          password = f"{cid}~?~{csec}"
          xml = f"""<?xml version="1.0" encoding="UTF-8"?>
          <settings>
            <servers>
              <server>
                <id>anypoint-exchange-v3-student-deployment</id>
                <username>~~~Client~~~</username>
                <password>{password}</password>
              </server>
              <server>
                <id>anypoint-exchange-v3</id>
                <username>~~~Client~~~</username>
                <password>{password}</password>
              </server>
              <server>
                <id>releases-ee</id>
                <username>~~~Client~~~</username>
                <password>{password}</password>
              </server>
              <server>
                <id>mulesoft-releases</id>
                <username>~~~Client~~~</username>
                <password>{password}</password>
              </server>
            </servers>
          </settings>"""
          pathlib.Path.home().joinpath('.m2').mkdir(exist_ok=True)
          pathlib.Path.home().joinpath('.m2/settings.xml').write_text(xml)
          print(f"settings.xml written. Client ID starts with: {cid[:6]}...")
          PYEOF
        env:
          ANYPOINT_CLIENT_ID: ${{ secrets.ANYPOINT_CLIENT_ID }}
          ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }}
