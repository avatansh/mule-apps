name: MUnit Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  munit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Install BOM
        run: mvn install -f bom/pom.xml -N
      - name: Install parent POM
        run: mvn install -f parent-pom/pom.xml -N
      - name: Run MUnit - customer-web-eapi
        run: mvn test -f customer-web-eapi/pom.xml
