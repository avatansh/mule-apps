name: MUnit Tests
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
jobs:
  munit:
    runs-on: ubuntu-latest
    env:
      ANYPOINT_CLIENT_ID: ${{ secrets.ANYPOINT_CLIENT_ID }}
      ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: temurin
      - name: Install Maven 3.8.8
        run: |
          wget -q https://archive.apache.org/dist/maven/maven-3/3.8.8/binaries/apache-maven-3.8.8-bin.tar.gz
          tar -xzf apache-maven-3.8.8-bin.tar.gz
          echo "$PWD/apache-maven-3.8.8/bin" >> $GITHUB_PATH
      - name: Write settings.xml
        run: |
          mkdir -p ~/.m2
          python3 -c "
          import os, pathlib
          cid = os.environ['ANYPOINT_CLIENT_ID']
          csec = os.environ['ANYPOINT_CLIENT_SECRET']
          pw = cid + '~?~' + csec
          xml = '''<?xml version=\"1.0\"?>
          <settings>
            <servers>
              <server><id>anypoint-exchange-v3-student-deployment</id><username>~~~Client~~~</username><password>''' + pw + '''</password></server>
              <server><id>anypoint-exchange-v3</id><username>~~~Client~~~</username><password>''' + pw + '''</password></server>
              <server><id>releases-ee</id><username>~~~Client~~~</username><password>''' + pw + '''</password></server>
              <server><id>mulesoft-releases</id><username>~~~Client~~~</username><password>''' + pw + '''</password></server>
            </servers>
          </settings>'''
          pathlib.Path.home().joinpath('.m2/settings.xml').write_text(xml)
          print('Written. ID starts: ' + cid[:6])
          "
      - name: Verify credentials and settings
        run: |
          echo "Client ID length: ${#ANYPOINT_CLIENT_ID}"
          echo "Client Secret length: ${#ANYPOINT_CLIENT_SECRET}"
          echo "Client ID first 6: ${ANYPOINT_CLIENT_ID:0:6}"
          echo "=== settings.xml content ==="
          sed 's/<password>[^<]*<\/password>/<password>MASKED<\/password>/g' ~/.m2/settings.xml
      - name: Install BOM
        run: mvn -s ~/.m2/settings.xml install -f bom/pom.xml -N
      - name: Install parent POM
        run: mvn -s ~/.m2/settings.xml install -f parent-pom/pom.xml -N
      - name: Install apps-commons
        run: mvn -s ~/.m2/settings.xml install -f apps-commons/pom.xml
      - name: Run MUnit
        run: mvn -s ~/.m2/settings.xml test -f customer-web-eapi/pom.xml
